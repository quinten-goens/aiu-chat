# Gold evaluation set for the text-to-SQL data path.
#
# Each case runs end-to-end through answer_data_question() against the real
# ingested data, then checks the EXECUTED RESULT (deterministic) rather than the
# narration prose (which varies run to run). Ground-truth values were taken from
# the data as of ingestion (2010 through 2026-05); if you re-ingest, refresh
# them or widen tolerances.
#
# Check types (any combination):
#   expect_answerable: false   -> expects the model to decline (CANNOT_ANSWER)
#   expected_value / tolerance -> a single scalar cell must match within tolerance
#   expected_text_in           -> this substring must appear somewhere in the result
#   sql_must_contain           -> list of substrings (case-insensitive) required in SQL
#   sql_must_not_contain       -> list of substrings (case-insensitive) forbidden in SQL

cases:
  - id: top_state_co2_2024
    question: "Which state had the highest CO2 emissions in 2024?"
    expected_text_in: "UNITED KINGDOM"
    sql_must_contain: ["sum", "2024"]

  - id: top5_states_co2_2024
    question: "Which 5 states had the most CO2 emissions in 2024?"
    expected_text_in: "GERMANY"
    sql_must_contain: ["sum", "limit"]

  - id: total_co2_france_2023
    question: "What were France's total CO2 emissions in tonnes in 2023?"
    expected_value: 20404815.0
    tolerance: 1.0          # rounding only
    sql_must_contain: ["sum", "france"]
    sql_must_not_contain: ["avg"]   # trap: CO2 is a monthly TOTAL, never average it

  - id: total_flights_germany_2022
    question: "How many IFR flights did Germany have in total in 2022?"
    expected_value: 902063.0
    tolerance: 1.0
    sql_must_contain: ["sum"]

  - id: distinct_states_2024
    question: "How many distinct states are in the data for 2024?"
    expected_value: 43
    tolerance: 0

  - id: earliest_year
    question: "What is the earliest year covered by the CO2 data?"
    expected_value: 2010
    tolerance: 0

  - id: per_flight_co2_uses_division
    question: "What was the average CO2 per flight for Spain in 2024 (tonnes)?"
    # per-flight = SUM(CO2)/SUM(TF); must NOT just average CO2_QTY_TONNES.
    sql_must_contain: ["co2_qty_tonnes", "tf"]

  # --- multi-dataset cases (added with the full dataset registry) ---

  - id: top_airport_movements_2024
    question: "Which airport had the most total flight movements in 2024?"
    expected_text_in: "Istanbul"
    sql_must_contain: ["airport_traffic", "sum"]

  - id: enroute_weather_delay_2023
    question: "What was the total en-route ATFM delay caused by weather across all ANSPs in 2023, in minutes?"
    # must use the weather cause code DLY_ERT_W_1, not the total DLY_ERT_1
    sql_must_contain: ["dly_ert_w_1", "sum"]

  - id: taxi_out_per_flight_division
    question: "Which airport had the worst average additional taxi-out time per flight in 2024?"
    # per-flight additional time must divide by the reference flight count
    sql_must_contain: ["total_add_time_min", "total_ref_nb_fl"]

  # --- concept path (answered from scraped pages + ingested PDFs) ---

  - id: concept_atfm_acronym
    question: "What does ATFM stand for?"
    expected_text_in: "Air Traffic Flow Management"

  - id: concept_asma_methodology_from_pdf
    question: "How is additional ASMA time calculated?"
    # Should retrieve and answer from the ingested methodology PDF(s); we only
    # require that it produces a grounded answer (ok), not a specific string.
    expect_answerable: true

  # --- live sources (route + answerability; values change so no fixed number) ---

  - id: route_dataapp_daily_country
    question: "How many flights did France have on the latest available day?"
    expected_route: dataapp
    expect_answerable: true

  - id: route_nm_live_airborne
    question: "How many aircraft are airborne right now?"
    expected_route: nm_live
    expect_answerable: true

  - id: route_nm_live_delays_now
    question: "Which areas have the most network delay right now?"
    expected_route: nm_live
    expect_answerable: true

  - id: route_data_not_live_for_history
    question: "Which 5 states had the most CO2 emissions in 2024?"
    # historical question must stay on the local data path, not a live API
    expected_route: data
    expected_text_in: "GERMANY"

  - id: out_of_scope_weather_forecast
    question: "What will the weather be in Paris tomorrow?"
    expected_route: none
    expect_answerable: false

  - id: out_of_scope_other_domain
    question: "What is the GDP of Japan?"
    expected_route: none
    expect_answerable: false

  # --- clarification (ask when vague, don't nag when clear) ---

  - id: clarify_vague_metric_no_subject
    question: "Get me traffic"
    # in-domain but no subject -> should ask, not decline or guess
    expect_clarification: true

  - id: no_clarify_when_specified
    question: "Traffic at Heathrow in 2024"
    # subject + metric + time present -> answer directly, no nagging
    expect_clarification: false
    expected_route: data
